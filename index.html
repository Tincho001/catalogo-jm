<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listas JM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="eyebrow">Listas JM</div>
      <h1>Catálogo</h1>
      <p class="subtitle">Pantallas y módulos</p>
    </header>

    <main class="content">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Buscar modelo..." />
      </div>

      <div id="brandTabs" class="brand-tabs"></div>
      <div id="catalog" class="catalog"></div>
    </main>

    <a
      class="floating-wa"
      href="#"
      aria-label="WhatsApp"
      title="WhatsApp"
    >
      <span>✆</span>
    </a>
  </div>

  <script src="script.js"></script>
</body>
</html>
